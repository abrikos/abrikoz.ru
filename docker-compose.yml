services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017"
    volumes:
      - mongo-data:/data/db

  nuxt:
    build: .
    env_file:
      - ./.env
    environment:
      - NUXT_MONGOOSE_URI=mongodb://mongodb:27017/abrikoz
    ports:
      - "127.0.0.1:9000:3000"
    depends_on:
      - mongodb

volumes:
  mongo-data:
    driver: local
